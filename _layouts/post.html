---
layout: default
---

<section class="page-section">
  <div class="container">
    <article class="post">
      <header class="post__header reveal">
        <h1 class="post__title">{{ page.title }}</h1>
        <time class="post__date" datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %e, %Y" }}
        </time>
      </header>

      <div class="post__content reveal">
        {{ content }}
      </div>

      <footer class="post__footer reveal">
        <a href="{{ site.baseurl }}/" class="btn btn--secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Home
        </a>
      </footer>
    </article>
  </div>
</section>

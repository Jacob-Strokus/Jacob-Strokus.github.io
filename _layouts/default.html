<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.name }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">
    <meta name="author" content="{{ site.name }}">
    <meta property="og:title" content="{{ page.title | default: site.name }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:image" content="{{ site.avatar }}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css">
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml">
  </head>

  <body>
    <!-- Animated background particles -->
    <div class="bg-particles" aria-hidden="true">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- Navigation -->
    <nav class="nav" id="mainNav">

        </a>

          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav__links" id="navLinks">
          <a href="{{ site.baseurl }}/" class="nav__link {% if page.url == '/' %}nav__link--active{% endif %}">Home</a>
          <a href="{{ site.baseurl }}/about" class="nav__link {% if page.url == '/about/' %}nav__link--active{% endif %}">About</a>
          <a href="{{ site.baseurl }}/projects" class="nav__link {% if page.url == '/projects/' %}nav__link--active{% endif %}">Projects</a>
          <a href="{{ site.baseurl }}/resume" class="nav__link {% if page.url == '/resume/' %}nav__link--active{% endif %}">Resume</a>
          <a href="https://github.com/Jacob-Strokus" class="nav__link nav__link--cta" target="_blank" rel="noopener">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub

        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main>
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__container">
        <div class="footer__grid">
          <div class="footer__brand">
            <a href="{{ site.baseurl }}/" class="footer__logo">Jas Strokus</a>
            <p class="footer__tagline">Building things that matter.</p>
          </div>
          <div class="footer__nav">
            <h4 class="footer__heading">Navigate</h4>
            <a href="{{ site.baseurl }}/" class="footer__link">Home</a>
            <a href="{{ site.baseurl }}/about" class="footer__link">About</a>
            <a href="{{ site.baseurl }}/projects" class="footer__link">Projects</a>
            <a href="{{ site.baseurl }}/resume" class="footer__link">Resume</a>
          </div>
          <div class="footer__social">
            <h4 class="footer__heading">Connect</h4>
            <div class="footer__social-links">
              <a href="https://github.com/Jacob-Strokus" target="_blank" rel="noopener" class="footer__social-link" aria-label="GitHub">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
              </a>
              <a href="https://www.linkedin.com/in/jacob-strokus/" target="_blank" rel="noopener" class="footer__social-link" aria-label="LinkedIn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              </a>
              <a href="mailto:jasstrokus8@gmail.com" class="footer__social-link" aria-label="Email">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              </a>
            </div>
          </div>
        </div>
        <div class="footer__bottom">
          <p>&copy; {{ site.time | date: '%Y' }} Jas Strokus. Crafted with purpose.</p>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script>
      // Scroll reveal animation
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

      document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        observer.observe(el);
      });

      // Navbar scroll effect
      const nav = document.getElementById('mainNav');
      let lastScroll = 0;
      window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll > 50) {
          nav.classList.add('nav--scrolled');
        } else {
          nav.classList.remove('nav--scrolled');
        }
        lastScroll = currentScroll;
      });

      // Mobile nav toggle
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      navToggle.addEventListener('click', () => {
        navToggle.classList.toggle('active');
        navLinks.classList.toggle('active');
      });

      // Smooth scroll for anchor links
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });

      // Typing animation
      function typeWriter(element, text, speed = 80) {
        let i = 0;
        element.textContent = '';
        function type() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
          }
        }
        type();
      }

      // Initialize typing on hero if present
      const typingEl = document.querySelector('.hero__typing');
      if (typingEl) {
        const texts = JSON.parse(typingEl.dataset.texts || '[]');
        let textIndex = 0;
        function cycleText() {
          if (texts.length === 0) return;
          typingEl.textContent = '';
          let charIndex = 0;
          function typeChar() {
            if (charIndex < texts[textIndex].length) {
              typingEl.textContent += texts[textIndex].charAt(charIndex);
              charIndex++;
              setTimeout(typeChar, 80);
            } else {
              setTimeout(() => {
                let delIndex = texts[textIndex].length;
                function deleteChar() {
                  if (delIndex > 0) {
                    typingEl.textContent = texts[textIndex].substring(0, delIndex - 1);
                    delIndex--;
                    setTimeout(deleteChar, 40);
                  } else {
                    textIndex = (textIndex + 1) % texts.length;
                    setTimeout(typeChar, 500);
                    charIndex = 0;
                  }
                }
                deleteChar();
              }, 2000);
            }
          }
          typeChar();
        }
        setTimeout(cycleText, 800);
      }

      // Parallax effect on mouse move for hero
      const hero = document.querySelector('.hero');
      if (hero) {
        hero.addEventListener('mousemove', (e) => {
          const { clientX, clientY } = e;
          const { innerWidth, innerHeight } = window;
          const x = (clientX / innerWidth - 0.5) * 20;
          const y = (clientY / innerHeight - 0.5) * 20;
          const orbs = hero.querySelectorAll('.hero__orb');
          orbs.forEach((orb, i) => {
            const factor = (i + 1) * 0.5;
            orb.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
          });
        });
      }

      // Counter animation for stats
      function animateCounter(el) {
        const target = parseInt(el.dataset.count);
        const suffix = el.dataset.suffix || '';
        const duration = 2000;
        const start = performance.now();
        function update(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.floor(target * eased) + suffix;
          if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
      }

      const counterObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && !entry.target.dataset.animated) {
            entry.target.dataset.animated = 'true';
            animateCounter(entry.target);
          }
        });
      }, { threshold: 0.5 });

      document.querySelectorAll('.counter').forEach(el => counterObserver.observe(el));

      // Tilt effect on project cards
      document.querySelectorAll('.card--tilt').forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (y - centerY) / 20;
          const rotateY = (centerX - x) / 20;
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
        });
      });
    </script>
  </body>
</html>
